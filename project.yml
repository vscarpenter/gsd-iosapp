name: GSD
options:
  bundleIdPrefix: dev.vinny
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: "52HVJ3VDSM"   # owner's Apple Developer team — applies to all targets (incl. Phase 6 extensions)
    # Version is project-wide: the app and ALL embedded extensions must share one
    # CFBundleShortVersionString/CFBundleVersion (App Store rule). Bump these two lines
    # per release — never per-target (that's how the app/extension versions drifted apart).
    MARKETING_VERSION: "2.1.0"
    CURRENT_PROJECT_VERSION: "28"
    # Xcode 26 "recommended settings" — declared here so they survive `xcodegen
    # generate` (clicking "Perform Changes" in Xcode would edit the generated pbxproj
    # and be wiped). These are already the SDK-default resolved values; made explicit
    # so Xcode stops prompting. No run-script build phases exist for sandboxing to gate.
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_FRAMEWORK_EXTENSIONS: "NO"
packages:
  GSDKit:
    path: GSDKit
targets:
  GSD:
    type: application
    platform: iOS
    sources:
      - App
      # The marketing-demo faux Home Screen renders the real widget view in-app; compiling
      # these two GSDWidgets sources into the app too keeps a single source of truth.
      - Widgets/TodaysFocusView.swift
      - Widgets/TodaysFocusEntry.swift
    info:
      path: App/Info.plist
      properties:
        # Home-screen label — anything longer than ~12 chars truncates under the icon.
        # The full "GSD Task Manager" name belongs in App Store Connect, not here.
        CFBundleDisplayName: GSD
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        # Required by the Mac App Store (Catalyst) archive validation; ignored by iOS, which
        # takes its category from App Store Connect. GSD is a task manager → productivity.
        LSApplicationCategoryType: public.app-category.productivity
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchMark
          UIImageRespectsSafeAreaInsets: true
        # `fetch` only: the sole background task is a BGAppRefreshTask (dev.vinny.gsd.refresh).
        # Declaring `processing` with no BGProcessingTask is an App Review question-magnet.
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - dev.vinny.gsd.refresh
        CFBundleURLTypes:
          - CFBundleURLName: dev.vinny.gsd
            CFBundleURLSchemes:
              - gsd
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: dev.vinny.gsd.new-task
            UIApplicationShortcutItemTitle: New Task
            UIApplicationShortcutItemSubtitle: Capture in GSD
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAdd
          - UIApplicationShortcutItemType: dev.vinny.gsd.today-focus
            UIApplicationShortcutItemTitle: Today's Focus
            UIApplicationShortcutItemSubtitle: Open priority tasks
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeFavorite
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDStore
      - package: GSDKit
        product: GSDSync
      - package: GSDKit
        product: GSDSnapshot
      - target: GSDWidgets
        embed: true
        platformFilter: iOS
      # No platformFilter — the Share Extension is built for Mac Catalyst too, so GSD
      # appears in the macOS Share menu (Widgets stay iOS-only above).
      - target: GSDShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/GSD.entitlements
        CODE_SIGN_STYLE: Automatic
        # --- Mac Catalyst ---
        SUPPORTS_MACCATALYST: "YES"
        # Keep dev.vinny.gsd on both platforms (one App Store Connect record).
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        # macOS-SDK (Catalyst) build uses sandbox entitlements; iOS keeps GSD.entitlements.
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": App/GSD-Catalyst.entitlements
  GSDWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: GSD Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd.widgets
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Widgets/GSDWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDSnapshot
  GSDShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: GSD
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd.share
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/GSDShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        # --- Mac Catalyst --- so GSD is a share target on macOS too.
        SUPPORTS_MACCATALYST: "YES"
        # Keep dev.vinny.gsd.share on both platforms (one App Store Connect record).
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        # macOS-SDK (Catalyst) build needs sandbox entitlements; iOS keeps its own file.
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": ShareExtension/GSDShareExtension-Catalyst.entitlements
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDSnapshot
  # App Store screenshot runner (not a correctness test target — the app's logic gate
  # remains `swift test` + a clean build). Drives the live app through its main screens
  # and writes full-res PNGs; see ScreenshotTests/ScreenshotTests.swift for the env vars.
  GSDScreenshotTests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ScreenshotTests
    dependencies:
      - target: GSD
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd.screenshot-tests
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: GSD
        GENERATE_INFOPLIST_FILE: "YES"
# A single shared scheme that builds/archives the GSD app (extensions ride along as
# embedded dependencies). Without this, Xcode auto-creates one scheme per target and may
# default to GSDShareExtension, mislabeling the archive — the bug this resolves.
schemes:
  GSD:
    build:
      targets:
        GSD: all
    run:
      config: Debug
    archive:
      config: Release
  # Separate scheme so screenshot runs never touch the main GSD scheme/archive flow.
  GSDScreenshots:
    build:
      targets:
        GSDScreenshotTests: all
    test:
      config: Debug
      targets:
        - GSDScreenshotTests
