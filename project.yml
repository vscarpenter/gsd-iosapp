name: GSD
options:
  bundleIdPrefix: dev.vinny
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: "52HVJ3VDSM"   # owner's Apple Developer team — applies to all targets (incl. Phase 6 extensions)
packages:
  GSDKit:
    path: GSDKit
targets:
  GSD:
    type: application
    platform: iOS
    sources:
      - App
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - dev.vinny.gsd.refresh
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDStore
      - package: GSDKit
        product: GSDSync
      - package: GSDKit
        product: GSDSnapshot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/GSD.entitlements
        CODE_SIGN_STYLE: Automatic
