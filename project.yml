name: GSD
options:
  bundleIdPrefix: dev.vinny
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: "52HVJ3VDSM"   # owner's Apple Developer team — applies to all targets (incl. Phase 6 extensions)
    # Version is project-wide: the app and ALL embedded extensions must share one
    # CFBundleShortVersionString/CFBundleVersion (App Store rule). Bump these two lines
    # per release — never per-target (that's how the app/extension versions drifted apart).
    MARKETING_VERSION: "0.5"
    CURRENT_PROJECT_VERSION: "2"
packages:
  GSDKit:
    path: GSDKit
targets:
  GSD:
    type: application
    platform: iOS
    sources:
      - App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: GSD Task Manager
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchMark
          UIImageRespectsSafeAreaInsets: true
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - dev.vinny.gsd.refresh
        CFBundleURLTypes:
          - CFBundleURLName: dev.vinny.gsd
            CFBundleURLSchemes:
              - gsd
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDStore
      - package: GSDKit
        product: GSDSync
      - package: GSDKit
        product: GSDSnapshot
      - target: GSDWidgets
        embed: true
      - target: GSDShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/GSD.entitlements
        CODE_SIGN_STYLE: Automatic
  GSDWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: GSD Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd.widgets
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Widgets/GSDWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDSnapshot
  GSDShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: GSD
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vinny.gsd.share
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/GSDShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GSDKit
        product: GSDModel
      - package: GSDKit
        product: GSDSnapshot
# A single shared scheme that builds/archives the GSD app (extensions ride along as
# embedded dependencies). Without this, Xcode auto-creates one scheme per target and may
# default to GSDShareExtension, mislabeling the archive — the bug this resolves.
schemes:
  GSD:
    build:
      targets:
        GSD: all
    run:
      config: Debug
    archive:
      config: Release
